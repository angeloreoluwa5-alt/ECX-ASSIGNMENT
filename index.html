<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediMind</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
    <section id="start-screen">
     <h1>MediMind: Test Your Medical Knowledge</h1>
      <p>Hi! My name is Kalejaiye Oreoluwa Angel, a biomedical engineering student. I curated this MediMind quiz to test your medical knowledge and help you learn important facts about the human body in a fun way. Are you ready to challenge yourself?</p>
  <button id="start-btn">Start Quiz</button>   
    </section>
    <section id="quiz-screen" class="hidden">
        <p id="progress"></p>
        <h2 id="question"></h2>
        <div id="answers"></div> <p id="feedback"></p>
    </section>
    <section id="result-screen" class="hidden">
        <h2 id="score-text"></h2>
        <button id="restart-btn">RESTART QUIZ</button>
    </section>
    </main>
    <script src="script.js"></script>
</body> 
</html>
